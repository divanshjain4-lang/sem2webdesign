<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bootstrap Cards Grid</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
  <div class="row g-4">

    <!-- Card 1 -->
    <div class="col-md-4">
      <div class="card h-100">
        <img src="https://via.placeholder.com/300x200" class="card-img-top" alt="card image">
        <div class="card-body">
          <h5 class="card-title">Card One</h5>
          <p class="card-text">This is a simple Bootstrap card using the grid system.</p>
          <a href="#" class="btn btn-primary">Read More</a>
        </div>
      </div>
    </div>

    <!-- Card 2 -->
    <div class="col-md-4">
      <div class="card h-100">
        <img src="https://via.placeholder.com/300x200" class="card-img-top" alt="card image">
        <div class="card-body">
          <h5 class="card-title">Card Two</h5>
          <p class="card-text">Cards automatically align using Bootstrap columns.</p>
          <a href="#" class="btn btn-primary">Read More</a>
        </div>
      </div>
    </div>

    <!-- Card 3 -->
    <div class="col-md-4">
      <div class="card h-100">
        <img src="https://via.placeholder.com/300x200" class="card-img-top" alt="card image">
        <div class="card-body">
          <h5 class="card-title">Card Three</h5>
          <p class="card-text">Responsive grid makes layout adapt to screen size.</p>
          <a href="#" class="btn btn-primary">Read More</a>
        </div>
      </div>
    </div>

  </div>
</div>

</body>
</html>
